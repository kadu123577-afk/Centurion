<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Centurion — Gestão Licitatória</title>
  <link rel="stylesheet" href="../src/style.css">
  <style>
    html, body { overflow: hidden; height: 100%; }
    .app-shell { display:flex; flex-direction:column; height:100vh; }

    /* ── Topbar ── */
    .topbar { height:52px; min-height:52px; display:flex; align-items:center; gap:16px; padding:0 16px; background:var(--s1); border-bottom:1px solid var(--border); z-index:10; flex-shrink:0; }
    .topbar-sep { width:1px; height:20px; background:var(--border2); }
    .topbar-mun { font-size:12px; color:var(--text2); }
    .topbar-spacer { flex:1; }
    .topbar-user { display:flex; align-items:center; gap:10px; }
    .user-avatar { width:30px; height:30px; border-radius:50%; background:var(--s3); border:1px solid var(--border2); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:var(--green); font-family:var(--font-display); }
    .user-nome   { font-size:12px; font-weight:600; }
    .user-perfil { font-size:11px; color:var(--text2); }

    /* ══════════════════════════════════════
       TELA 1 — LISTA DE PROCESSOS
    ══════════════════════════════════════ */
    #tela-lista { display:flex; flex:1; overflow:hidden; }

    .sidebar { width:300px; min-width:300px; display:flex; flex-direction:column; background:var(--s1); border-right:1px solid var(--border); overflow:hidden; transition:width .25s ease; }
    .sidebar-head { padding:14px; border-bottom:1px solid var(--border); display:flex; flex-direction:column; gap:10px; }
    .sidebar-label { font-size:10px; font-weight:700; color:var(--text2); text-transform:uppercase; letter-spacing:.08em; }
    .sidebar-search { position:relative; }
    .sidebar-search input { padding-left:28px; background:var(--s2); }
    .sidebar-search-icon { position:absolute; left:9px; top:50%; transform:translateY(-50%); font-size:12px; color:var(--muted); pointer-events:none; }
    .sidebar-filters { display:flex; gap:5px; flex-wrap:wrap; }
    .filter-chip { padding:3px 10px; border-radius:20px; font-size:11px; font-weight:500; cursor:pointer; border:1px solid var(--border2); background:transparent; color:var(--text2); font-family:var(--font-body); transition:all .15s; }
    .filter-chip.on { background:var(--green-l); border-color:rgba(65,243,106,.3); color:var(--green); }
    .sidebar-list { flex:1; overflow-y:auto; padding:8px; }

    .proc-card { padding:12px; border-radius:var(--r); cursor:pointer; border:1px solid transparent; margin-bottom:4px; transition:all .15s; position:relative; }
    .proc-card:hover { background:var(--s2); border-color:var(--border); }
    .proc-card.ativo { background:var(--s2); border-color:rgba(65,243,106,.25); }
    .proc-card-num { font-size:10px; font-weight:700; color:var(--text2); margin-bottom:3px; }
    .proc-card-obj { font-size:12px; font-weight:500; color:var(--text); line-height:1.4; margin-bottom:8px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .proc-card-footer { display:flex; align-items:center; justify-content:space-between; }
    .proc-dots { display:flex; gap:3px; }
    .proc-dot { width:6px; height:6px; border-radius:50%; background:var(--s3); }
    .proc-dot.done { background:var(--green); }
    .proc-dot.cur  { background:var(--teal); }
    .proc-aguardando { position:absolute; top:10px; right:10px; width:8px; height:8px; border-radius:50%; background:var(--green); animation:pulse-dot 1.5s ease-in-out infinite; }
    @keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.8)} }

    .main-vazia { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; color:var(--muted); }
    .main-vazia-icon  { font-size:48px; opacity:.25; }
    .main-vazia-title { font-size:15px; font-weight:600; color:var(--text2); }
    .main-vazia-sub   { font-size:13px; text-align:center; max-width:260px; line-height:1.6; }

    /* ══════════════════════════════════════
       TELA 2 — PROCESSO ABERTO
    ══════════════════════════════════════ */
    #tela-processo { display:none; flex:1; flex-direction:column; overflow:hidden; }
    #tela-processo.on { display:flex; }

    /* Header do processo */
    .proc-topbar { height:52px; min-height:52px; display:flex; align-items:center; gap:12px; padding:0 20px; background:var(--s1); border-bottom:1px solid var(--border); flex-shrink:0; }
    .proc-topbar-meta { flex:1; min-width:0; display:flex; align-items:center; gap:12px; }
    .proc-topbar-num { font-size:11px; font-weight:700; color:var(--text2); background:var(--s2); padding:3px 8px; border-radius:var(--r-sm); white-space:nowrap; }
    .proc-topbar-obj { font-size:14px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:500px; }
    .proc-topbar-acts { display:flex; gap:8px; flex-shrink:0; align-items:center; }

    /* Layout interno do processo */
    .proc-body { flex:1; display:flex; overflow:hidden; }

    /* Stepper vertical — só admin vê */
    .stepper { width:52px; min-width:52px; background:var(--s1); border-right:1px solid var(--border); display:flex; flex-direction:column; align-items:center; padding:12px 0; gap:4px; overflow-y:auto; }
    .stepper.oculto { display:none; }
    .step-item { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; cursor:pointer; transition:all .15s; background:var(--s3); color:var(--text2); position:relative; flex-shrink:0; }
    .step-item:hover { background:var(--s2); color:var(--text); }
    .step-item.ativo { background:var(--green); color:#000; }
    .step-item.concluido { background:var(--green-l); color:var(--green); }
    .step-item[title]:hover::after { content:attr(title); position:absolute; left:44px; top:50%; transform:translateY(-50%); background:var(--s1); border:1px solid var(--border2); color:var(--text); font-size:11px; font-weight:500; white-space:nowrap; padding:4px 10px; border-radius:var(--r-sm); z-index:100; pointer-events:none; box-shadow:var(--shadow); }

    /* Split: formulário + preview */
    .split { flex:1; display:grid; grid-template-columns:1fr 1fr; overflow:hidden; }

    /* Painel formulário */
    .form-panel { display:flex; flex-direction:column; overflow:hidden; border-right:1px solid var(--border); }
    .form-panel-head { padding:14px 20px; border-bottom:1px solid var(--border); flex-shrink:0; display:flex; align-items:center; justify-content:space-between; }
    .form-panel-title { font-size:14px; font-weight:700; }
    .form-panel-sub   { font-size:11px; color:var(--text2); margin-top:2px; }
    .form-panel-body  { flex:1; overflow-y:auto; padding:20px; }
    .form-panel-foot  { padding:12px 20px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:8px; flex-shrink:0; background:var(--s1); }

    /* Indicador não salvo */
    .unsaved { display:none; align-items:center; gap:6px; font-size:11px; color:var(--orange); }
    .unsaved.on { display:flex; }
    .unsaved-dot { width:6px; height:6px; border-radius:50%; background:var(--orange); animation:pulse-dot 1.2s ease-in-out infinite; }

    /* Painel preview */
    .preview-panel { display:flex; flex-direction:column; overflow:hidden; background:#EDEAE4; }
    .preview-head { padding:8px 16px; background:var(--s1); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
    .preview-head-label { font-size:11px; color:var(--text2); }
    .preview-body { flex:1; overflow-y:auto; padding:16px; }
    .pdf-doc { background:#fff; border-radius:4px; box-shadow:0 2px 12px rgba(0,0,0,.15); padding:40px 36px; min-height:600px; font-family:'Times New Roman',Times,serif; font-size:11.5px; line-height:1.7; color:#111; }
    .pdf-header { text-align:center; border-bottom:2.5px solid #000; padding-bottom:16px; margin-bottom:20px; }
    .pdf-brasao { font-size:30px; margin-bottom:6px; }
    .pdf-pref   { font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:.03em; }
    .pdf-cnpj   { font-size:10px; color:#666; margin-top:2px; }
    .pdf-titulo { margin-top:12px; font-size:14px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; }
    .pdf-num    { font-size:10px; color:#888; margin-top:4px; }
    .pdf-section { margin-bottom:14px; }
    .pdf-section-title { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:#555; margin-bottom:6px; border-bottom:1px solid #eee; padding-bottom:4px; }
    .pdf-field  { margin-bottom:6px; line-height:1.6; }
    .pdf-field-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:#666; }
    .pdf-justificativa { text-align:justify; text-indent:1.25cm; margin-top:8px; }
    .pdf-footer { margin-top:40px; padding-top:12px; border-top:1px solid #ddd; display:flex; justify-content:space-between; font-size:9px; color:#aaa; }
    .pdf-hash { font-family:monospace; font-size:8px; word-break:break-all; max-width:55%; text-align:right; }
    .pdf-assinatura { margin-top:48px; text-align:center; }
    .pdf-assinatura-linha { border-top:1px solid #000; display:inline-block; width:280px; padding-top:6px; }
    .pdf-assinatura-nome  { font-weight:700; font-size:12px; }
    .pdf-assinatura-cargo { font-size:10px; color:#555; }

    /* Etapa concluída */
    .etapa-concluida { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; text-align:center; padding:40px; }
    .etapa-concluida-icon  { font-size:48px; }
    .etapa-concluida-title { font-size:18px; font-weight:700; color:var(--green); font-family:var(--font-display); }
    .etapa-concluida-sub   { font-size:14px; color:var(--text2); line-height:1.6; max-width:380px; }

    /* Etapa bloqueada */
    .etapa-bloqueada { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; text-align:center; padding:40px; }
    .etapa-bloqueada-icon  { font-size:40px; opacity:.4; }
    .etapa-bloqueada-title { font-size:15px; font-weight:600; color:var(--text2); }
    .etapa-bloqueada-sub   { font-size:13px; color:var(--muted); line-height:1.6; max-width:320px; }

    /* Skeleton */
    .sk { background:var(--s2); border-radius:var(--r-sm); animation:sk-pulse 1.4s ease-in-out infinite; margin-bottom:8px; }
    .sk-card { height:72px; }
    @keyframes sk-pulse { 0%,100%{opacity:.4} 50%{opacity:.8} }
  </style>
</head>
<body>
<div class="app-shell">

  <!-- Topbar global -->
  <header class="topbar">
    <div class="brand-icon" style="width:28px;height:28px;font-size:12px">C</div>
    <div><div class="brand-name" style="font-size:14px">Centurion</div></div>
    <div class="topbar-sep"></div>
    <span class="topbar-mun">Município: <strong id="tb-municipio">—</strong></span>
    <div class="topbar-spacer"></div>
    <div class="topbar-user">
      <div class="user-avatar" id="tb-avatar">—</div>
      <div>
        <div class="user-nome"   id="tb-nome">Carregando...</div>
        <div class="user-perfil" id="tb-perfil">—</div>
      </div>
      <button class="btn btn-ghost btn-sm" id="btn-admin" style="display:none">⚙ Admin</button>
      <button class="btn btn-ghost btn-sm" id="btn-logout">Sair</button>
    </div>
  </header>

  <!-- ══ TELA 1: LISTA ══ -->
  <div id="tela-lista">
    <aside class="sidebar">
      <div class="sidebar-head">
        <div class="sidebar-label">Processos Licitatórios</div>
        <button class="btn btn-primary btn-sm" id="btn-novo" style="width:100%;justify-content:center">+ Novo Processo</button>
        <div class="sidebar-search">
          <span class="sidebar-search-icon">🔍</span>
          <input class="input" type="text" id="sb-busca" placeholder="Número ou objeto...">
        </div>
        <div class="sidebar-filters">
          <button class="filter-chip on" data-filtro="todos">Todos</button>
          <button class="filter-chip" data-filtro="andamento">Andamento</button>
          <button class="filter-chip" data-filtro="concluido">Concluídos</button>
          <button class="filter-chip" data-filtro="rascunho">Rascunho</button>
        </div>
      </div>
      <div class="sidebar-list" id="sb-lista"></div>
    </aside>

    <div class="main-vazia">
      <div class="main-vazia-icon">📋</div>
      <div class="main-vazia-title">Selecione um processo</div>
      <div class="main-vazia-sub">Escolha um processo licitatório na lista ao lado para começar.</div>
    </div>
  </div>

  <!-- ══ TELA 2: PROCESSO ABERTO ══ -->
  <div id="tela-processo">

    <!-- Header do processo -->
    <div class="proc-topbar">
      <button class="btn btn-ghost btn-sm" id="btn-voltar">← Voltar</button>
      <div class="topbar-sep"></div>
      <div class="proc-topbar-meta">
        <span class="proc-topbar-num" id="pv-num">—</span>
        <span class="proc-topbar-obj" id="pv-obj">—</span>
        <span id="pv-badge"></span>
      </div>
      <div class="proc-topbar-acts">
        <div class="unsaved" id="unsaved-indicator">
          <div class="unsaved-dot"></div>
          <span>Não salvo</span>
        </div>
      </div>
    </div>

    <div class="proc-body">

      <!-- Stepper (só admin) -->
      <div class="stepper oculto" id="stepper"></div>

      <!-- Split -->
      <div class="split">

        <!-- Formulário -->
        <div class="form-panel">
          <div class="form-panel-head">
            <div>
              <div class="form-panel-title" id="fp-titulo">—</div>
              <div class="form-panel-sub"   id="fp-sub">—</div>
            </div>
          </div>
          <div class="form-panel-body" id="form-ct"></div>
          <div class="form-panel-foot" id="form-foot" style="display:none">
            <button class="btn btn-ghost btn-sm" id="btn-rascunho">💾 Salvar rascunho</button>
            <button class="btn btn-primary"      id="btn-concluir">✅ Concluir etapa</button>
          </div>
        </div>

        <!-- Preview -->
        <div class="preview-panel">
          <div class="preview-head">
            <span class="preview-head-label">Pré-visualização do documento</span>
            <button class="btn btn-ghost btn-sm" id="btn-pdf">⬇ PDF</button>
          </div>
          <div class="preview-body">
            <div class="pdf-doc" id="pdf-doc"></div>
          </div>
        </div>

      </div>
    </div>
  </div>

</div>

<!-- Modal: Novo Processo -->
<div class="modal-overlay" id="modal-novo" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title">Novo Processo Licitatório</div>
        <div class="modal-subtitle">Preencha os dados básicos para iniciar.</div>
      </div>
      <button class="btn btn-icon btn-ghost" id="modal-fechar">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="field col-full">
          <label class="label required">Objeto da contratação</label>
          <input class="input" type="text" id="np-objeto" placeholder="Ex: Aquisição de medicamentos para a rede municipal">
        </div>
        <div class="field">
          <label class="label required">Tipo de contratação</label>
          <select class="select" id="np-tipo">
            <option value="">Selecione...</option>
            <option value="Aquisição de Bens">Aquisição de Bens</option>
            <option value="Serviços Comuns">Serviços Comuns</option>
            <option value="Obras e Engenharia">Obras e Engenharia</option>
            <option value="Locação">Locação</option>
            <option value="Dispensa de Licitação">Dispensa de Licitação</option>
            <option value="Inexigibilidade">Inexigibilidade</option>
          </select>
        </div>
        <div class="field">
          <label class="label required">Setor requisitante</label>
          <input class="input" type="text" id="np-setor" placeholder="Ex: Secretaria Municipal de Saúde">
        </div>
        <div class="field col-full">
          <label class="label">Valor estimado (R$)</label>
          <input class="input" type="text" id="np-valor" placeholder="0,00">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="modal-cancelar">Cancelar</button>
      <button class="btn btn-primary" id="modal-criar">Criar Processo</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script type="module">
import { sb }                          from '../src/services/supabase.js';
import { iniciarSessao, logout, isAdmin } from '../src/services/auth.js';
import { state, setState }             from '../src/services/state.js';
import { toast, confirmar }            from '../src/utils/ui.js';
import { esc, data, dataExtenso, moeda } from '../src/utils/format.js';

/* ════════════════════════════════════════
   CONFIGURAÇÃO
════════════════════════════════════════ */
const ETAPAS = [
  { n:1,  id:'DFD',        nome:'DFD',               label:'Documento de Formalização de Demanda',      perfil:'requisitante'  },
  { n:2,  id:'Protocolo',  nome:'Protocolo',          label:'Registro e Protocolo',                      perfil:'protocolo'     },
  { n:3,  id:'ETP',        nome:'ETP + TR',           label:'Estudo Técnico Preliminar + Termo de Ref.', perfil:'requisitante'  },
  { n:4,  id:'PP',         nome:'Pesquisa de Preços', label:'Pesquisa de Preços de Mercado',             perfil:'compras'       },
  { n:5,  id:'Dotacao',    nome:'Dotação Orç.',       label:'Dotação Orçamentária',                      perfil:'contabilidade' },
  { n:6,  id:'Autorizacao',nome:'Autorização',        label:'Autorização do Gestor',                     perfil:'secretaria'    },
  { n:7,  id:'Minuta',     nome:'Minuta Edital',      label:'Elaboração da Minuta do Edital',            perfil:'licitacao'     },
  { n:8,  id:'Parecer',    nome:'Parecer',            label:'Parecer Jurídico',                          perfil:'juridico'      },
  { n:9,  id:'Edital',     nome:'Edital Final',       label:'Edital Final e Aprovação',                  perfil:'licitacao'     },
  { n:10, id:'Publicacao', nome:'Publicação',         label:'Publicação e Abertura',                     perfil:'licitacao'     },
];

const PERFIL_LABEL = { requisitante:'Requisitante', protocolo:'Protocolo', compras:'Compras', contabilidade:'Contabilidade', secretaria:'Secretaria', licitacao:'Licitação', juridico:'Jurídico', admin:'Administrador' };
const STATUS_BADGE = { rascunho:'badge badge-gray', andamento:'badge badge-blue', aguardando:'badge badge-gold', concluido:'badge badge-green', suspenso:'badge badge-red' };
const STATUS_LABEL = { rascunho:'Rascunho', andamento:'Em andamento', aguardando:'Aguardando', concluido:'Concluído', suspenso:'Suspenso' };

/* ════════════════════════════════════════
   ESTADO LOCAL
════════════════════════════════════════ */
let processos = [], docsAbertos = [], etapaAtual = null;
let filtroAtivo = 'todos', buscaQuery = '';
let naoSalvo = false;
let autoSaveTimer = null;

/* ════════════════════════════════════════
   BOOT
════════════════════════════════════════ */
async function init() {
  const usuario = await iniciarSessao();
  if (!usuario) return;

  const nome = usuario.nome || usuario.email || 'Usuário';
  const ini  = nome.trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase();
  document.getElementById('tb-avatar').textContent    = ini;
  document.getElementById('tb-nome').textContent      = nome;
  document.getElementById('tb-perfil').textContent    = PERFIL_LABEL[usuario.perfil] || usuario.perfil || '—';
  document.getElementById('tb-municipio').textContent = usuario.prefeituras?.municipio || '—';

  if (isAdmin()) {
    document.getElementById('btn-admin').style.display = '';
  }

  await carregarProcessos();
  bindListeners();
}

/* ════════════════════════════════════════
   LISTA DE PROCESSOS
════════════════════════════════════════ */
async function carregarProcessos() {
  const lista = document.getElementById('sb-lista');
  lista.innerHTML = Array(4).fill('<div class="sk sk-card"></div>').join('');

  const { data: rows, error } = await sb
    .from('processos')
    .select('*, documentos(tipo, status)')
    .eq('prefeitura_id', state.prefeitura?.id)
    .order('created_at', { ascending: false })
    .range(0, 49);

  if (error) { toast('Erro ao carregar processos.', 'error'); return; }
  processos = rows || [];
  renderSidebar();
}

function renderSidebar() {
  const lista = document.getElementById('sb-lista');
  const usuario = state.usuario;
  let rows = processos;

  if (filtroAtivo !== 'todos') rows = rows.filter(p => p.status === filtroAtivo);
  if (buscaQuery) {
    const q = buscaQuery.toLowerCase();
    rows = rows.filter(p => p.numero_protocolo?.toLowerCase().includes(q) || p.objeto?.toLowerCase().includes(q));
  }

  if (!rows.length) {
    lista.innerHTML = '<div style="padding:24px;font-size:12px;color:var(--muted);text-align:center">Nenhum processo encontrado.</div>';
    return;
  }

  // Etapas que este perfil é responsável
  const minhasEtapas = ETAPAS.filter(e => e.perfil === usuario?.perfil).map(e => e.id);

  lista.innerHTML = rows.map(p => {
    const docs  = p.documentos || [];
    const dots  = ETAPAS.map(e => {
      const doc = docs.find(d => d.tipo === e.id);
      const cls = doc?.status === 'concluido' ? 'done' : (p.etapa_atual === e.n ? 'cur' : '');
      return `<div class="proc-dot ${cls}"></div>`;
    }).join('');

    // Aguardando este usuário?
    const etapaAtualCfg = ETAPAS.find(e => e.n === p.etapa_atual);
    const aguardandoEu  = !isAdmin() && etapaAtualCfg && minhasEtapas.includes(etapaAtualCfg.id);
    const docAtual      = docs.find(d => d.tipo === etapaAtualCfg?.id);
    const aguardandoEuReal = aguardandoEu && (!docAtual || docAtual.status === 'rascunho');

    const bc = STATUS_BADGE[p.status] || 'badge badge-gray';
    const bl = STATUS_LABEL[p.status] || p.status;

    return `
      <div class="proc-card" data-id="${p.id}">
        ${aguardandoEuReal ? '<div class="proc-aguardando" title="Aguardando sua ação"></div>' : ''}
        <div class="proc-card-num">${esc(p.numero_protocolo || '—')}</div>
        <div class="proc-card-obj">${esc(p.objeto || '—')}</div>
        <div class="proc-card-footer">
          <div class="proc-dots">${dots}</div>
          <span class="${bc}" style="font-size:10px">${bl}</span>
        </div>
      </div>`;
  }).join('');

  lista.querySelectorAll('.proc-card').forEach(card => {
    card.addEventListener('click', () => {
      const p = processos.find(x => x.id === card.dataset.id);
      if (p) abrirProcesso(p);
    });
  });
}

/* ════════════════════════════════════════
   ABRIR PROCESSO
════════════════════════════════════════ */
async function abrirProcesso(proc) {
  setState('processoAtual', proc);
  etapaAtual = null;

  // Troca de tela
  document.getElementById('tela-lista').style.display    = 'none';
  document.getElementById('tela-processo').classList.add('on');

  // Popula header
  document.getElementById('pv-num').textContent = proc.numero_protocolo || '—';
  document.getElementById('pv-obj').textContent = proc.objeto || '—';
  const bc = STATUS_BADGE[proc.status] || 'badge badge-gray';
  const bl = STATUS_LABEL[proc.status] || proc.status;
  document.getElementById('pv-badge').innerHTML = `<span class="${bc}" style="font-size:11px">${bl}</span>`;

  // Busca documentos
  const { data: docs } = await sb.from('documentos').select('*').eq('processo_id', proc.id);
  docsAbertos = docs || [];

  // Stepper — só admin
  const admin = isAdmin();
  const stepper = document.getElementById('stepper');
  if (admin) {
    stepper.classList.remove('oculto');
    renderStepper();
  } else {
    stepper.classList.add('oculto');
  }

  // Carrega etapa correta
  const usuario = state.usuario;
  if (admin) {
    // Admin vai para a etapa atual do processo
    carregarEtapa(proc.etapa_atual || 1);
  } else {
    // Usuário vai para a etapa que é dele
    const minhaEtapa = ETAPAS.find(e => e.perfil === usuario?.perfil);
    if (minhaEtapa) {
      carregarEtapa(minhaEtapa.n);
    } else {
      document.getElementById('form-ct').innerHTML = `
        <div class="etapa-bloqueada">
          <div class="etapa-bloqueada-icon">🔒</div>
          <div class="etapa-bloqueada-title">Sem etapas atribuídas</div>
          <div class="etapa-bloqueada-sub">Seu perfil não possui etapas neste processo.</div>
        </div>`;
    }
  }
}

function voltarParaLista() {
  // Confirma se tem alterações não salvas
  if (naoSalvo) {
    if (!confirm('Há alterações não salvas. Deseja sair mesmo assim?')) return;
  }
  document.getElementById('tela-processo').classList.remove('on');
  document.getElementById('tela-lista').style.display = 'flex';
  setState('processoAtual', null);
  naoSalvo = false;
  document.getElementById('unsaved-indicator').classList.remove('on');
  carregarProcessos(); // Atualiza a lista
}

/* ════════════════════════════════════════
   STEPPER (admin)
════════════════════════════════════════ */
function renderStepper() {
  const proc    = state.processoAtual;
  const stepper = document.getElementById('stepper');
  stepper.innerHTML = '';

  ETAPAS.forEach(cfg => {
    const doc       = docsAbertos.find(d => d.tipo === cfg.id);
    const concluida = doc?.status === 'concluido';
    const ativa     = cfg.n === (etapaAtual?.n || proc?.etapa_atual);
    const cls       = ativa ? 'ativo' : (concluida ? 'concluido' : '');
    const num       = concluida ? '✓' : cfg.n;

    const el = document.createElement('div');
    el.className = `step-item ${cls}`;
    el.textContent = num;
    el.title = cfg.nome;
    el.addEventListener('click', () => carregarEtapa(cfg.n));
    stepper.appendChild(el);
  });
}

/* ════════════════════════════════════════
   CARREGAR ETAPA
════════════════════════════════════════ */
function carregarEtapa(n) {
  const cfg = ETAPAS.find(e => e.n === n);
  if (!cfg) return;
  etapaAtual = cfg;

  if (isAdmin()) renderStepper();

  document.getElementById('fp-titulo').textContent = `${cfg.n}. ${cfg.label}`;
  document.getElementById('fp-sub').textContent    = `Responsável: ${PERFIL_LABEL[cfg.perfil]}`;

  const usuario    = state.usuario;
  const podeEditar = isAdmin() ? false : cfg.perfil === usuario?.perfil; // Admin só observa
  const doc        = docsAbertos.find(d => d.tipo === cfg.id);
  const concluida  = doc?.status === 'concluido';

  // Etapa concluída
  if (concluida && !isAdmin()) {
    document.getElementById('form-ct').innerHTML = `
      <div class="etapa-concluida">
        <div class="etapa-concluida-icon">✅</div>
        <div class="etapa-concluida-title">Etapa concluída!</div>
        <div class="etapa-concluida-sub">
          Esta etapa foi concluída em ${data(doc.updated_at)}.<br>
          O processo avançou para a próxima fase.
        </div>
        <button class="btn btn-ghost btn-sm" onclick="voltarParaListaGlobal()">← Voltar para a lista</button>
      </div>`;
    document.getElementById('form-foot').style.display = 'none';
    renderPreview(cfg, doc?.dados || {});
    return;
  }

  // Etapa bloqueada (não é a etapa deste usuário)
  const proc = state.processoAtual;
  if (!podeEditar && !isAdmin()) {
    const etapaResponsavel = ETAPAS.find(e => e.perfil === usuario?.perfil);
    const etapaAtualProc   = ETAPAS.find(e => e.n === proc?.etapa_atual);
    document.getElementById('form-ct').innerHTML = `
      <div class="etapa-bloqueada">
        <div class="etapa-bloqueada-icon">⏳</div>
        <div class="etapa-bloqueada-title">Processo em tramitação</div>
        <div class="etapa-bloqueada-sub">
          Atualmente na etapa <strong>${etapaAtualProc?.nome || '—'}</strong>.<br>
          Sua etapa é <strong>${etapaResponsavel?.nome || '—'}</strong> — você será notificado quando chegar.
        </div>
      </div>`;
    document.getElementById('form-foot').style.display = 'none';
    renderPreview(cfg, doc?.dados || {});
    return;
  }

  // Renderiza formulário
  renderForm(cfg, doc, podeEditar || isAdmin());
  renderPreview(cfg, doc?.dados || {});

  // Mostra/oculta rodapé de ações
  document.getElementById('form-foot').style.display = (podeEditar && !concluida) ? 'flex' : 'none';

  // Auto-preview em tempo real
  iniciarAutoPreview(cfg);
}

/* ════════════════════════════════════════
   COLETA DE DADOS DO FORMULÁRIO
════════════════════════════════════════ */
function coletarForm(n) {
  const g = id => document.getElementById(id)?.value ?? '';
  const mapas = {
    1:  () => ({ objeto:g('dfd-obj'), setor:g('dfd-setor'), quantidade:g('dfd-qtd'), unidade:g('dfd-und'), valor_estimado:g('dfd-val'), prazo:g('dfd-prazo'), justificativa:g('dfd-just'), responsavel:g('dfd-resp'), cargo:g('dfd-cargo') }),
    2:  () => ({ numero:g('prot-num'), data_entrada:g('prot-data'), recebido_por:g('prot-recv'), setor_destino:g('prot-dest'), obs:g('prot-obs') }),
    3:  () => ({ necessidade:g('etp-nec'), solucao:g('etp-sol'), requisitos:g('etp-req'), fund_legal:g('etp-fund'), tr_objeto:g('tr-obj'), prazo_execucao:g('tr-prazo'), especificacoes:g('tr-esp'), obrigacoes:g('tr-obr') }),
    4:  () => ({ forn1:g('pp-f1'), val1:g('pp-v1'), forn2:g('pp-f2'), val2:g('pp-v2'), forn3:g('pp-f3'), val3:g('pp-v3'), media:g('pp-med'), metodo:g('pp-met'), obs:g('pp-obs') }),
    5:  () => ({ dotacao:g('dot-dot'), fonte:g('dot-fon'), valor:g('dot-val'), empenho:g('dot-emp'), obs:g('dot-obs') }),
    6:  () => ({ autorizado_por:g('aut-aut'), data:g('aut-dat'), decisao:g('aut-dec'), despacho:g('aut-obs') }),
    7:  () => ({ modalidade:g('min-mod'), criterio:g('min-cri'), objeto_edital:g('min-obj'), exigencias:g('min-hab') }),
    8:  () => ({ numero:g('par-num'), data:g('par-dat'), advogado:g('par-adv'), conclusao:g('par-con'), fundamentacao:g('par-fund'), obs:g('par-obs') }),
    9:  () => ({ numero:g('ef-num'), data_publicacao:g('ef-dpub'), data_sessao:g('ef-dses'), hora_sessao:g('ef-hora'), obs:g('ef-obs') }),
    10: () => ({ veiculo:g('pub-vei'), data:g('pub-dat'), numero_aviso:g('pub-nav'), link:g('pub-lnk') }),
  };
  return mapas[n]?.() || {};
}

/* ════════════════════════════════════════
   SALVAR ETAPA
════════════════════════════════════════ */
async function salvarEtapa(concluir = false) {
  const cfg  = etapaAtual;
  const proc = state.processoAtual;
  if (!cfg || !proc) return;

  if (concluir) {
    const ok = await confirmar(`Concluir a etapa "${cfg.nome}"?`, {
      titulo: 'Confirmar conclusão',
      labelSim: 'Concluir',
      subtitulo: 'Esta ação não poderá ser desfeita.'
    });
    if (!ok) return;
  }

  const btn = document.getElementById(concluir ? 'btn-concluir' : 'btn-rascunho');
  if (btn) { btn.disabled = true; btn.textContent = 'Salvando...'; }

  try {
    const dados   = coletarForm(cfg.n);
    const status  = concluir ? 'concluido' : 'rascunho';
    const existente = docsAbertos.find(d => d.tipo === cfg.id);
    const payload   = { processo_id: proc.id, tipo: cfg.id, dados, status, updated_at: new Date().toISOString() };

    let error;
    if (existente) {
      ({ error } = await sb.from('documentos').update(payload).eq('id', existente.id));
    } else {
      ({ error } = await sb.from('documentos').insert(payload));
    }
    if (error) throw error;

    // Avança o processo
    if (concluir) {
      const proximaEtapa = cfg.n < 10 ? cfg.n + 1 : cfg.n;
      const novoStatus   = cfg.n === 10 ? 'concluido' : 'andamento';
      await sb.from('processos').update({ etapa_atual: proximaEtapa, status: novoStatus }).eq('id', proc.id);
    }

    // Atualiza estado local
    const { data: docs } = await sb.from('documentos').select('*').eq('processo_id', proc.id);
    docsAbertos = docs || [];

    marcarSalvo();

    if (concluir) {
      toast(`"${cfg.nome}" concluída! Processo avançou.`, 'success');
      // Usuário comum volta para a lista após concluir
      if (!isAdmin()) {
        setTimeout(() => voltarParaLista(), 2000);
        carregarEtapa(cfg.n); // Mostra tela de concluída
      } else {
        carregarEtapa(Math.min(cfg.n + 1, 10));
        if (isAdmin()) renderStepper();
      }
    } else {
      toast('Rascunho salvo.', 'info');
    }
  } catch(e) {
    toast('Erro ao salvar: ' + e.message, 'error');
  } finally {
    if (btn) {
      btn.disabled = false;
      btn.textContent = concluir ? '✅ Concluir etapa' : '💾 Salvar rascunho';
    }
  }
}

function marcarSalvo() {
  naoSalvo = false;
  document.getElementById('unsaved-indicator').classList.remove('on');
}

function marcarNaoSalvo() {
  if (!naoSalvo) {
    naoSalvo = true;
    document.getElementById('unsaved-indicator').classList.add('on');
  }
  // Auto-save local a cada 30s
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(() => {
    const proc = state.processoAtual;
    const cfg  = etapaAtual;
    if (proc && cfg) {
      const dados = coletarForm(cfg.n);
      localStorage.setItem(`draft_${proc.id}_${cfg.id}`, JSON.stringify({ dados, ts: Date.now() }));
      toast('Rascunho salvo localmente.', 'info', 2000);
      marcarSalvo();
    }
  }, 30000);
}

/* ════════════════════════════════════════
   PREVIEW AO VIVO
════════════════════════════════════════ */
function iniciarAutoPreview(cfg) {
  const formCt = document.getElementById('form-ct');
  if (!formCt) return;
  formCt.querySelectorAll('input, textarea, select').forEach(el => {
    el.addEventListener('input', () => {
      marcarNaoSalvo();
      renderPreview(cfg, coletarForm(cfg.n));
    });
    el.addEventListener('change', () => {
      marcarNaoSalvo();
      renderPreview(cfg, coletarForm(cfg.n));
    });
  });
}

function renderPreview(cfg, d) {
  const pref = state.prefeitura || {};
  const proc = state.processoAtual;
  const hoje = dataExtenso();

  const linhas = {
    1:  [['Objeto',d.objeto],['Setor',d.setor],['Quantidade',d.quantidade && d.unidade ? `${d.quantidade} ${d.unidade}` : ''],['Valor estimado',d.valor_estimado ? 'R$ '+d.valor_estimado : '']],
    2:  [['Protocolo nº',d.numero],['Data de entrada',d.data_entrada],['Recebido por',d.recebido_por],['Setor de destino',d.setor_destino]],
    3:  [['Objeto TR',d.tr_objeto],['Prazo de entrega',d.prazo_execucao ? d.prazo_execucao+' dias' : ''],['Necessidade',d.necessidade]],
    4:  [['Fornecedor 1',d.forn1 ? `${d.forn1} — R$ ${d.val1}` : ''],['Fornecedor 2',d.forn2 ? `${d.forn2} — R$ ${d.val2}` : ''],['Fornecedor 3',d.forn3 ? `${d.forn3} — R$ ${d.val3}` : ''],['Valor médio',d.media ? 'R$ '+d.media : '']],
    5:  [['Dotação',d.dotacao],['Fonte',d.fonte],['Valor a empenhar',d.valor ? 'R$ '+d.valor : ''],['Empenho',d.empenho]],
    6:  [['Autorizado por',d.autorizado_por],['Data',d.data],['Decisão',d.decisao],['Motivação',d.despacho]],
    7:  [['Modalidade',d.modalidade],['Critério de julgamento',d.criterio],['Objeto',d.objeto_edital]],
    8:  [['Parecer nº',d.numero],['Procurador',d.advogado],['Conclusão',d.conclusao],['Fundamentação',d.fundamentacao]],
    9:  [['Edital nº',d.numero],['Data de publicação',d.data_publicacao],['Data da sessão',d.data_sessao],['Hora',d.hora_sessao]],
    10: [['Veículo',d.veiculo],['Data',d.data],['Nº do aviso',d.numero_aviso],['Link',d.link]],
  };

  const campos = (linhas[cfg.n] || [])
    .filter(([,v]) => v)
    .map(([l,v]) => `<div class="pdf-field"><span class="pdf-field-label">${l}:</span> ${esc(String(v))}</div>`)
    .join('') || '<div style="color:#aaa;font-style:italic;font-size:11px">Preencha os campos ao lado para ver o documento.</div>';

  // Justificativa com parágrafo especial para DFD
  const justificativa = cfg.n === 1 && d.justificativa
    ? `<div class="pdf-section">
        <div class="pdf-section-title">Justificativa</div>
        <div class="pdf-justificativa">${esc(d.justificativa)}</div>
       </div>` : '';

  // Assinatura para etapas que têm responsável
  const responsavel = d.responsavel || d.autorizado_por || d.advogado || '';
  const cargo       = d.cargo || '';
  const assinatura  = responsavel ? `
    <div class="pdf-assinatura">
      <div class="pdf-assinatura-linha">
        <div class="pdf-assinatura-nome">${esc(responsavel)}</div>
        ${cargo ? `<div class="pdf-assinatura-cargo">${esc(cargo)}</div>` : ''}
      </div>
      <div style="font-size:10px;color:#888;margin-top:8px">${esc(pref.municipio || '')}, ${hoje}</div>
    </div>` : '';

  document.getElementById('pdf-doc').innerHTML = `
    <div class="pdf-header">
      <div class="pdf-brasao">🏛️</div>
      <div class="pdf-pref">${esc(pref.nome || 'PREFEITURA MUNICIPAL')}</div>
      <div class="pdf-cnpj">${pref.cnpj ? 'CNPJ: ' + esc(pref.cnpj) : ''} ${pref.municipio ? '· ' + esc(pref.municipio) : ''}${pref.uf ? '/' + esc(pref.uf) : ''}</div>
      <div class="pdf-titulo">${esc(cfg.label)}</div>
      <div class="pdf-num">Processo nº ${esc(proc?.numero_protocolo || '—')} · Etapa ${cfg.n}/10</div>
    </div>
    <div class="pdf-section">
      <div class="pdf-section-title">Dados</div>
      ${campos}
    </div>
    ${justificativa}
    ${assinatura}
    <div class="pdf-footer">
      <div>
        <div>Lei Federal nº 14.133/2021 · TCM-GO · IN-009/2023</div>
        <div>Gerado em ${new Date().toLocaleString('pt-BR')}</div>
      </div>
      <div class="pdf-hash">SHA-256: gerado ao concluir a etapa</div>
    </div>`;
}

/* ════════════════════════════════════════
   CRIAR PROCESSO
════════════════════════════════════════ */
async function criarProcesso() {
  const objeto = document.getElementById('np-objeto').value.trim();
  const tipo   = document.getElementById('np-tipo').value;
  const setor  = document.getElementById('np-setor').value.trim();
  const valor  = document.getElementById('np-valor').value;

  if (!objeto || !tipo || !setor) { toast('Preencha os campos obrigatórios.', 'warning'); return; }

  const btn = document.getElementById('modal-criar');
  btn.disabled = true; btn.textContent = 'Criando...';

  try {
    const pref = state.prefeitura;
    const ano  = new Date().getFullYear();
    const { count } = await sb.from('processos').select('*', { count:'exact', head:true }).eq('prefeitura_id', pref?.id);
    const numero = `${String((count||0)+1).padStart(4,'0')}/${ano}`;

    const { data: proc, error } = await sb.from('processos').insert({
      prefeitura_id: pref?.id,
      numero_protocolo: numero,
      objeto, tipo_contratacao: tipo,
      setor_requisitante: setor,
      valor_estimado: valor,
      etapa_atual: 1,
      status: 'rascunho',
    }).select().single();

    if (error) throw error;

    fecharModal();
    toast(`Processo ${numero} criado!`);
    await carregarProcessos();
    abrirProcesso({ ...proc, documentos: [] });
  } catch(e) {
    toast('Erro ao criar processo: ' + e.message, 'error');
  } finally {
    btn.disabled = false; btn.textContent = 'Criar Processo';
  }
}

function abrirModal()  { document.getElementById('modal-novo').style.display = 'flex'; }
function fecharModal() {
  document.getElementById('modal-novo').style.display = 'none';
  ['np-objeto','np-setor','np-valor'].forEach(id => { document.getElementById(id).value=''; });
  document.getElementById('np-tipo').value = '';
}

// Expõe globalmente para o onclick inline da etapa concluída
window.voltarParaListaGlobal = voltarParaLista;

/* ════════════════════════════════════════
   LISTENERS
════════════════════════════════════════ */
function bindListeners() {
  document.getElementById('btn-logout').addEventListener('click', async () => {
    if (await confirmar('Deseja sair do sistema?')) await logout();
  });
  document.getElementById('btn-admin').addEventListener('click', () => { window.location.href = '/admin.html'; });
  document.getElementById('btn-novo').addEventListener('click', abrirModal);
  document.getElementById('modal-fechar').addEventListener('click', fecharModal);
  document.getElementById('modal-cancelar').addEventListener('click', fecharModal);
  document.getElementById('modal-criar').addEventListener('click', criarProcesso);
  document.getElementById('modal-novo').addEventListener('click', e => { if (e.target === e.currentTarget) fecharModal(); });

  document.getElementById('btn-voltar').addEventListener('click', voltarParaLista);
  document.getElementById('btn-rascunho').addEventListener('click', () => salvarEtapa(false));
  document.getElementById('btn-concluir').addEventListener('click', () => salvarEtapa(true));
  document.getElementById('btn-pdf').addEventListener('click', () => toast('Geração de PDF em implementação.', 'info'));

  document.getElementById('sb-busca').addEventListener('input', e => { buscaQuery = e.target.value; renderSidebar(); });

  document.querySelectorAll('.filter-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('on'));
      chip.classList.add('on');
      filtroAtivo = chip.dataset.filtro;
      renderSidebar();
    });
  });
}

/* ── Start ── */
init().catch(console.error);
</script>
