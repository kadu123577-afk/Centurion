<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Centurion — Super Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#06090F; --s1:#0B1018; --s2:#0F1620; --s3:#152030;
  --border:rgba(255,255,255,0.06); --border2:rgba(255,255,255,0.10);
  --text:#EDF2F7; --text2:#8A9BAC; --muted:#4A5568;
  --green:#41F36A; --green-l:rgba(65,243,106,0.10);
  --teal:#14D9B5; --gold:#FFC857; --gold-l:rgba(255,200,87,0.10);
  --red:#FF5C6A; --red-l:rgba(255,92,106,0.10);
  --r:10px; --r-sm:6px;
  --font-display:'Syne',sans-serif; --font-body:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;font-family:var(--font-body);background:var(--bg);color:var(--text);font-size:14px;-webkit-font-smoothing:antialiased;}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:100;background:var(--s1);border-bottom:1px solid var(--border2);display:flex;align-items:center;padding:0 24px;height:52px;gap:12px;}
.brand{display:flex;align-items:center;gap:10px;}
.brand-icon{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#41F36A,#14D9B5);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:800;font-size:13px;color:#000;}
.brand-name{font-family:var(--font-display);font-weight:700;font-size:14px;background:linear-gradient(90deg,var(--green),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.badge-sa{background:var(--gold-l);color:var(--gold);border:1px solid rgba(255,200,87,.2);border-radius:20px;font-size:10px;font-weight:700;padding:2px 8px;letter-spacing:.05em;}
.topbar-sep{flex:1;}
.topbar-user{font-size:12px;color:var(--text2);}
.btn-sair{background:transparent;border:1px solid var(--border2);color:var(--text2);border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;font-family:var(--font-body);}
.btn-sair:hover{color:var(--text);}

/* LAYOUT */
.main{max-width:1100px;margin:0 auto;padding:28px 24px;}
.page-title{font-family:var(--font-display);font-size:20px;font-weight:700;margin-bottom:4px;}
.page-sub{font-size:13px;color:var(--text2);margin-bottom:28px;}

/* CARDS */
.section-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:22px;margin-bottom:20px;}
.section-card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text2);margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border);}

/* TABELA */
.tabela{width:100%;border-collapse:collapse;}
.tabela th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);padding:8px 12px;text-align:left;border-bottom:1px solid var(--border);}
.tabela td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle;}
.tabela tr:last-child td{border-bottom:none;}
.tabela tr:hover td{background:var(--s2);}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;}
.badge-on{background:var(--green-l);color:var(--green);}
.badge-off{background:var(--red-l);color:var(--red);}
.badge-role{background:var(--gold-l);color:var(--gold);}

/* BOTÕES */
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:var(--r-sm);font-size:12px;font-weight:500;font-family:var(--font-body);cursor:pointer;border:none;transition:opacity .15s;}
.btn:hover{opacity:.82;}
.btn-primary{background:var(--green);color:#000;font-weight:600;}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2);}
.btn-danger{background:var(--red-l);color:var(--red);border:1px solid rgba(255,92,106,.2);}
.btn-sm{padding:4px 8px;font-size:11px;}
.btn-group{display:flex;gap:8px;flex-wrap:wrap;}

/* FORM */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.form-field{display:flex;flex-direction:column;gap:5px;}
.form-field label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;}
input,select{width:100%;padding:8px 11px;background:var(--s2);border:1px solid var(--border2);border-radius:var(--r-sm);color:var(--text);font-size:13px;font-family:var(--font-body);outline:none;}
input:focus,select:focus{border-color:var(--green);}
input::placeholder{color:var(--muted);}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);z-index:500;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-ov.on{display:flex;}
.modal{background:var(--s1);border:1px solid var(--border2);border-radius:12px;width:100%;max-width:480px;max-height:90vh;display:flex;flex-direction:column;}
.modal-head{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-head h3{font-size:15px;font-weight:700;}
.modal-body{padding:18px 22px;overflow-y:auto;}
.modal-foot{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;}
.modal-close{background:var(--s2);border:none;color:var(--text2);width:26px;height:26px;border-radius:5px;cursor:pointer;font-size:13px;}

/* TOAST */
#toast-ct{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;}
.toast{min-width:240px;padding:11px 15px;border-radius:var(--r-sm);font-size:13px;background:var(--s1);border:1px solid var(--border2);box-shadow:0 4px 20px rgba(0,0,0,.5);animation:tIn .2s ease;display:flex;align-items:center;gap:8px;}
.toast-success{border-left:3px solid var(--green);}
.toast-error{border-left:3px solid var(--red);}
.toast-info{border-left:3px solid var(--teal);}
@keyframes tIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}

.loading{text-align:center;padding:40px;color:var(--muted);font-size:13px;}
.empty{text-align:center;padding:30px;color:var(--muted);font-size:13px;}
.erro-msg{color:var(--red);font-size:12px;margin-top:6px;display:none;}
.erro-msg.on{display:block;}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="brand">
    <div class="brand-icon">C</div>
    <div class="brand-name">CENTURION</div>
  </div>
  <span class="badge-sa">SUPER ADMIN</span>
  <div class="topbar-sep"></div>
  <span class="topbar-user" id="topbar-user"></span>
  <button class="btn-sair" onclick="sair()">Sair</button>
</div>

<!-- MAIN -->
<div class="main">
  <div class="page-title">Painel de Administração</div>
  <div class="page-sub">Gerencie prefeituras e seus administradores.</div>

  <!-- PREFEITURAS -->
  <div class="section-card">
    <div class="section-card-title" style="display:flex;align-items:center;justify-content:space-between;">
      <span>Prefeituras</span>
      <button class="btn btn-primary btn-sm" id="btn-nova-pref">+ Nova Prefeitura</button>
    </div>
    <div id="lista-prefeituras"><div class="loading">Carregando...</div></div>
  </div>
</div>

<div id="toast-ct"></div>

<!-- MODAL: Nova/Editar Prefeitura -->
<div class="modal-ov" id="modal-prefeitura">
  <div class="modal">
    <div class="modal-head">
      <h3 id="modal-pref-titulo">Nova Prefeitura</h3>
      <button class="modal-close" onclick="fecharModal('modal-prefeitura')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-field">
        <label>Nome da Prefeitura</label>
        <input type="text" id="inp-pref-nome" placeholder="Ex: Prefeitura Municipal de Nova Crixás">
        <span class="erro-msg" id="erro-pref"></span>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="fecharModal('modal-prefeitura')">Cancelar</button>
      <button class="btn btn-primary" id="btn-salvar-pref" onclick="salvarPrefeitura()">Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL: Criar/Ver Admin 2 -->
<div class="modal-ov" id="modal-admin2">
  <div class="modal">
    <div class="modal-head">
      <h3 id="modal-admin2-titulo">Admin da Prefeitura</h3>
      <button class="modal-close" onclick="fecharModal('modal-admin2')">✕</button>
    </div>
    <div class="modal-body" id="modal-admin2-body">
    </div>
    <div class="modal-foot" id="modal-admin2-foot">
      <button class="btn btn-ghost" onclick="fecharModal('modal-admin2')">Fechar</button>
      <button class="btn btn-primary" id="btn-salvar-admin2" onclick="salvarAdmin2()" style="display:none;">Criar Admin</button>
    </div>
  </div>
</div>

<script type="module">
import { sb, sessao, logout,
  listarPrefeituras, criarPrefeitura, editarPrefeitura, togglePrefeitura,
  getAdmin2DaPrefeitura, criarAdmin2, editarAdmin2
} from './auth.js';

// ── Guarda de sessão ──────────────────────────────────────────
const { data: { session } } = await sb.auth.getSession();
if (!session) { window.location.href = 'login.html'; }
else {
  const { data: u } = await sb.from('usuarios').select('*').eq('id', session.user.id).single();
  if (!u || u.role !== 'super_admin') { window.location.href = 'login.html'; }
  sessao.authUser = session.user;
  sessao.usuario  = u;
  document.getElementById('topbar-user').textContent = u.nome || u.email;
  await renderPrefeituras();
  document.getElementById('btn-nova-pref').addEventListener('click', () => window.abrirModalPrefeitura());
}

// ── Utilitários ───────────────────────────────────────────────
const g = id => document.getElementById(id);

function toast(msg, tipo='info', dur=3000) {
  const ct = g('toast-ct');
  const el = document.createElement('div');
  el.className = 'toast toast-' + tipo;
  el.innerHTML = `<span>${tipo==='success'?'✓':tipo==='error'?'✕':'ℹ'}</span><span>${msg}</span>`;
  ct.appendChild(el);
  setTimeout(() => { el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(),300); }, dur);
}

window.fecharModal = id => g(id).classList.remove('on');

// ── Prefeituras ───────────────────────────────────────────────
async function renderPrefeituras() {
  const container = g('lista-prefeituras');
  try {
    const prefs = await listarPrefeituras();

    // Busca contagem de usuários por prefeitura
    const { data: usuarios } = await sb.from('usuarios')
      .select('prefeitura_id, role')
      .neq('role', 'super_admin');

    const contagem = {};
    (usuarios || []).forEach(u => {
      if (!contagem[u.prefeitura_id]) contagem[u.prefeitura_id] = { admin: 0, usuario: 0 };
      contagem[u.prefeitura_id][u.role] = (contagem[u.prefeitura_id][u.role] || 0) + 1;
    });

    if (!prefs.length) {
      container.innerHTML = '<div class="empty">Nenhuma prefeitura cadastrada. Clique em "+ Nova Prefeitura".</div>';
      return;
    }

    container.innerHTML = `
      <table class="tabela">
        <thead><tr>
          <th>Nome</th>
          <th>Admin 2</th>
          <th>Usuários</th>
          <th>Status</th>
          <th>Ações</th>
        </tr></thead>
        <tbody>
          ${prefs.map(p => {
            const c = contagem[p.id] || { admin: 0, usuario: 0 };
            return `<tr>
              <td><strong>${p.nome}</strong></td>
              <td>${c.admin > 0
                ? `<span class="badge badge-role">✓ Configurado</span>`
                : `<span style="color:var(--muted);font-size:12px;">Não configurado</span>`}
              </td>
              <td><span style="font-size:13px;">${c.usuario}/5 usuários</span></td>
              <td><span class="badge ${p.ativo?'badge-on':'badge-off'}">${p.ativo?'Ativa':'Inativa'}</span></td>
              <td>
                <div class="btn-group">
                  <button class="btn btn-ghost btn-sm" onclick="editarPref('${p.id}','${p.nome.replace(/'/g,"\\'")}')">✎ Editar</button>
                  <button class="btn btn-ghost btn-sm" onclick="gerenciarAdmin2('${p.id}','${p.nome.replace(/'/g,"\\'")}')">👤 Admin 2</button>
                  <button class="btn btn-sm ${p.ativo?'btn-danger':'btn-ghost'}" onclick="alternarPref('${p.id}',${!p.ativo})">
                    ${p.ativo?'⊘ Desativar':'✓ Ativar'}
                  </button>
                </div>
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>`;
  } catch(e) {
    container.innerHTML = `<div class="empty" style="color:var(--red);">Erro ao carregar: ${e.message}</div>`;
  }
}

// ── Modal Prefeitura ──────────────────────────────────────────
let _editPrefId = null;

window.abrirModalPrefeitura = () => {
  _editPrefId = null;
  g('modal-pref-titulo').textContent = 'Nova Prefeitura';
  g('inp-pref-nome').value = '';
  g('erro-pref').classList.remove('on');
  g('modal-prefeitura').classList.add('on');
  setTimeout(() => g('inp-pref-nome').focus(), 100);
};

window.editarPref = (id, nome) => {
  _editPrefId = id;
  g('modal-pref-titulo').textContent = 'Editar Prefeitura';
  g('inp-pref-nome').value = nome;
  g('erro-pref').classList.remove('on');
  g('modal-prefeitura').classList.add('on');
  setTimeout(() => g('inp-pref-nome').focus(), 100);
};

window.salvarPrefeitura = async () => {
  const nome = g('inp-pref-nome').value.trim();
  const btn  = g('btn-salvar-pref');
  const erro = g('erro-pref');
  erro.classList.remove('on');
  btn.disabled = true;
  try {
    if (_editPrefId) {
      await editarPrefeitura(_editPrefId, { nome });
      toast('Prefeitura atualizada!', 'success');
    } else {
      await criarPrefeitura({ nome });
      toast('Prefeitura criada!', 'success');
    }
    fecharModal('modal-prefeitura');
    await renderPrefeituras();
  } catch(e) {
    erro.textContent = e.message;
    erro.classList.add('on');
  } finally {
    btn.disabled = false;
  }
};

window.alternarPref = async (id, novoStatus) => {
  try {
    await togglePrefeitura(id, novoStatus);
    toast(novoStatus ? 'Prefeitura ativada.' : 'Prefeitura desativada.', 'success');
    await renderPrefeituras();
  } catch(e) {
    toast('Erro: ' + e.message, 'error');
  }
};

// ── Modal Admin 2 ─────────────────────────────────────────────
let _admin2PrefId = null;

window.gerenciarAdmin2 = async (prefId, prefNome) => {
  _admin2PrefId = prefId;
  g('modal-admin2-titulo').textContent = `Admin — ${prefNome}`;
  g('modal-admin2-body').innerHTML = '<div class="loading">Buscando...</div>';
  g('btn-salvar-admin2').style.display = 'none';
  g('modal-admin2').classList.add('on');

  try {
    const admin = await getAdmin2DaPrefeitura(prefId);
    if (admin) {
      g('modal-admin2-body').innerHTML = `
        <div style="background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:16px;">
          <div style="font-size:12px;color:var(--text2);margin-bottom:8px;">Admin atual</div>
          <div style="font-weight:600;margin-bottom:4px;">${admin.nome}</div>
          <div style="font-size:12px;color:var(--text2);">${admin.email}</div>
          <div style="margin-top:10px;">
            <span class="badge ${admin.ativo?'badge-on':'badge-off'}">${admin.ativo?'Ativo':'Inativo'}</span>
          </div>
        </div>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-sm ${admin.ativo?'btn-danger':'btn-ghost'}" onclick="toggleAdmin2('${admin.id}',${!admin.ativo})">
            ${admin.ativo?'⊘ Desativar Admin':'✓ Reativar Admin'}
          </button>
        </div>`;
    } else {
      g('modal-admin2-body').innerHTML = `
        <p style="font-size:13px;color:var(--text2);margin-bottom:16px;">Esta prefeitura ainda não tem Admin. Preencha os dados abaixo para criar.</p>
        <div class="form-grid" style="grid-template-columns:1fr;">
          <div class="form-field">
            <label>Nome completo</label>
            <input type="text" id="inp-a2-nome" placeholder="Nome do administrador">
          </div>
          <div class="form-field">
            <label>E-mail</label>
            <input type="email" id="inp-a2-email" placeholder="admin@prefeitura.gov.br">
          </div>
          <div class="form-field">
            <label>Senha inicial (mín. 8 caracteres)</label>
            <input type="password" id="inp-a2-senha" placeholder="••••••••">
          </div>
        </div>
        <span class="erro-msg" id="erro-admin2"></span>`;
      g('btn-salvar-admin2').style.display = 'inline-flex';
    }
  } catch(e) {
    g('modal-admin2-body').innerHTML = `<div style="color:var(--red);font-size:13px;">Erro: ${e.message}</div>`;
  }
};

window.salvarAdmin2 = async () => {
  const btn  = g('btn-salvar-admin2');
  const erro = g('erro-admin2');
  if (erro) erro.classList.remove('on');
  btn.disabled = true;
  btn.textContent = 'Criando...';
  try {
    await criarAdmin2(_admin2PrefId, {
      nome:  g('inp-a2-nome').value.trim(),
      email: g('inp-a2-email').value.trim(),
      senha: g('inp-a2-senha').value,
    });
    toast('Admin criado com sucesso!', 'success');
    fecharModal('modal-admin2');
    await renderPrefeituras();
  } catch(e) {
    if (erro) { erro.textContent = e.message; erro.classList.add('on'); }
    else toast(e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Criar Admin';
  }
};

window.toggleAdmin2 = async (id, novoStatus) => {
  try {
    await editarAdmin2(id, { ativo: novoStatus });
    toast(novoStatus ? 'Admin reativado.' : 'Admin desativado.', 'success');
    fecharModal('modal-admin2');
    await renderPrefeituras();
  } catch(e) {
    toast('Erro: ' + e.message, 'error');
  }
};

// ── Sair ──────────────────────────────────────────────────────
window.sair = async () => {
  await logout();
  window.location.href = 'login.html';
};
</script>
</body>
</html>
